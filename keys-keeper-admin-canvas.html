<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>keys-keeper · Web Admin · UX Canvas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;450;500;600&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.4/babel.min.js"></script>
<style>
:root {
  /* dark theme defaults */
  --bg: #0a0b0c;
  --bg-elevated: #0e1011;
  --surface: #131517;
  --surface-2: #181b1e;
  --surface-hover: #1f2327;
  --border: #24282d;
  --border-subtle: #1c1f23;
  --border-strong: #2f343a;
  --text: #e8e9eb;
  --text-2: #a3a8af;
  --text-3: #6c7178;
  --text-4: #44484e;
  --accent: #d97550;
  --accent-soft: rgba(217, 117, 80, 0.12);
  --accent-line: rgba(217, 117, 80, 0.35);
  --success: #6fb37a;
  --success-soft: rgba(111, 179, 122, 0.12);
  --danger: #d96565;
  --danger-soft: rgba(217, 101, 101, 0.12);
  --warning: #d9a850;
  --info: #6695d9;
  --info-soft: rgba(102, 149, 217, 0.12);
  --type-api: #d9a850;
  --type-ssh: #6fb37a;
  --type-server: #6695d9;
  --type-domain: #b773d9;
  --type-note: #8d92a0;
  --shadow-md: 0 1px 2px rgba(0,0,0,0.4), 0 4px 12px rgba(0,0,0,0.3);
  --shadow-lg: 0 4px 8px rgba(0,0,0,0.5), 0 16px 32px rgba(0,0,0,0.4);

  --row-pad-y-compact: 6px;
  --row-pad-y-comfortable: 10px;
  --row-pad-y-spacious: 14px;
  --space-pad-compact: 4px;
  --space-pad-comfortable: 8px;
  --space-pad-spacious: 12px;
}
:root[data-accent="teal"] {
  --accent: #44a8a0;
  --accent-soft: rgba(68, 168, 160, 0.12);
  --accent-line: rgba(68, 168, 160, 0.35);
}
:root[data-accent="amber"] {
  --accent: #d9a850;
  --accent-soft: rgba(217, 168, 80, 0.12);
  --accent-line: rgba(217, 168, 80, 0.35);
}
:root[data-theme="light"] {
  --bg: #fafaf9;
  --bg-elevated: #ffffff;
  --surface: #ffffff;
  --surface-2: #f4f4f3;
  --surface-hover: #ececea;
  --border: #d8d8d6;
  --border-subtle: #e8e8e6;
  --border-strong: #b8b8b6;
  --text: #161718;
  --text-2: #555960;
  --text-3: #808488;
  --text-4: #b0b3b8;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: "ss01", "cv11";
  overflow: hidden;
}
.mono {
  font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
  font-feature-settings: "ss01", "cv02", "cv11";
  letter-spacing: -0.01em;
}

#root { height: 100vh; }

/* ========== CANVAS LAYOUT ========== */
.canvas {
  display: grid;
  grid-template-columns: 1fr 380px;
  height: 100vh;
  background: var(--bg);
}
.stage {
  background: var(--bg);
  padding: 24px 28px 28px 28px;
  overflow: auto;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.stage-pill {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 5px 11px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 11px;
  letter-spacing: 0.06em;
  color: var(--text-2);
  font-family: 'JetBrains Mono', monospace;
  align-self: flex-start;
}
.stage-pill .id { color: var(--accent); font-weight: 600; }
.stage-pill .sep { color: var(--text-4); }
.stage-pill .state-tag {
  margin-left: 4px;
  padding: 1px 7px;
  background: var(--accent-soft);
  color: var(--accent);
  border-radius: 3px;
  font-size: 10px;
  letter-spacing: 0.08em;
}

.browser-frame {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  flex: 1;
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow-lg);
  min-height: 0;
}
.browser-chrome {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 9px 14px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.browser-dots { display: flex; gap: 7px; }
.browser-dots span {
  width: 11px; height: 11px; border-radius: 50%;
}
.browser-dots span:nth-child(1) { background: #ff5f57; }
.browser-dots span:nth-child(2) { background: #febc2e; }
.browser-dots span:nth-child(3) { background: #28c840; }
.browser-url {
  flex: 1;
  padding: 5px 11px;
  background: var(--surface-2);
  border: 1px solid var(--border-subtle);
  border-radius: 5px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11.5px;
  color: var(--text-2);
  display: flex;
  align-items: center;
  gap: 8px;
}
.browser-url .lock { color: var(--success); font-size: 10px; }
.browser-url .token { color: var(--text-3); }

.browser-content {
  flex: 1;
  min-height: 0;
  overflow: hidden;
  background: var(--bg);
  position: relative;
}

/* ========== SIDEBAR ========== */
.sidebar {
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: relative;
}
.sb-header {
  padding: 16px 18px 14px 18px;
  border-bottom: 1px solid var(--border);
}
.sb-header .brand {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  font-size: 13px;
  letter-spacing: -0.01em;
  display: flex;
  align-items: center;
  gap: 8px;
}
.sb-header .brand .glyph {
  width: 18px; height: 18px;
  border-radius: 4px;
  background: var(--accent);
  color: var(--bg);
  font-size: 11px;
  font-weight: 700;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.sb-header .sub {
  font-size: 10.5px;
  color: var(--text-3);
  margin-top: 4px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  font-family: 'JetBrains Mono', monospace;
}
.sb-body {
  flex: 1;
  overflow-y: auto;
  padding-bottom: 78px;
}
.sb-block {
  border-bottom: 1px solid var(--border-subtle);
  padding: 14px 18px 16px 18px;
}
.sb-block-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--text-3);
  text-transform: uppercase;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.sb-block-title .count {
  background: var(--surface-2);
  color: var(--text-3);
  padding: 1px 6px;
  border-radius: 3px;
  font-weight: 500;
}

.tweak {
  margin-bottom: 14px;
}
.tweak:last-child { margin-bottom: 0; }
.tweak-label {
  font-size: 11px;
  color: var(--text-2);
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.tweak-label .dim {
  font-family: 'JetBrains Mono', monospace;
  color: var(--text-4);
  font-size: 9.5px;
  letter-spacing: 0.06em;
  background: var(--surface-2);
  padding: 1px 5px;
  border-radius: 2px;
}
.tweak-toggles {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 4px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 3px;
}
.tweak-toggle {
  padding: 5px 8px;
  border-radius: 3px;
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  background: transparent;
  border: none;
  color: var(--text-3);
  cursor: pointer;
  text-transform: lowercase;
  letter-spacing: 0.02em;
  transition: background 80ms ease, color 80ms ease;
}
.tweak-toggle:hover { color: var(--text-2); background: var(--surface-2); }
.tweak-toggle.active {
  background: var(--accent);
  color: var(--bg);
  font-weight: 500;
}

.flow-selector {
  display: flex;
  gap: 4px;
  margin-bottom: 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 3px;
}
.flow-selector button {
  flex: 1;
  padding: 5px 0;
  background: transparent;
  border: none;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text-3);
  font-size: 11px;
  cursor: pointer;
  border-radius: 3px;
}
.flow-selector button:hover { color: var(--text-2); }
.flow-selector button.active { background: var(--surface-hover); color: var(--text); }
.flow-name {
  font-size: 11.5px;
  color: var(--text-2);
  margin-bottom: 10px;
  font-style: italic;
}

.flow-steps {
  display: flex;
  flex-direction: column;
  gap: 0;
}
.flow-step {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 6px 0;
  cursor: pointer;
  position: relative;
}
.flow-step:not(:last-child)::after {
  content: '';
  position: absolute;
  left: 6.5px;
  top: 22px;
  bottom: -6px;
  width: 1px;
  background: var(--border-subtle);
}
.flow-step .dot {
  width: 13px; height: 13px;
  border-radius: 50%;
  background: var(--bg);
  border: 1.5px solid var(--border-strong);
  flex-shrink: 0;
  margin-top: 2px;
  z-index: 1;
}
.flow-step.active .dot {
  background: var(--accent);
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.flow-step.completed .dot {
  background: var(--text-4);
  border-color: var(--text-4);
}
.flow-step .step-text {
  font-size: 12px;
  color: var(--text-3);
  line-height: 1.4;
  padding-bottom: 2px;
}
.flow-step.active .step-text { color: var(--text); }
.flow-step .step-screen {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-4);
  margin-top: 2px;
}
.flow-step.active .step-screen { color: var(--accent); }

.alt-state {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 8px;
  margin: 0 -8px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 11.5px;
  color: var(--text-2);
}
.alt-state:hover { background: var(--surface-hover); color: var(--text); }
.alt-state.active { background: var(--accent-soft); color: var(--accent); }
.alt-state .tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  background: var(--surface-2);
  color: var(--text-3);
  padding: 1px 5px;
  border-radius: 2px;
  letter-spacing: 0.05em;
  flex-shrink: 0;
}
.alt-state.active .tag {
  background: var(--accent);
  color: var(--bg);
}
.alt-state .label { flex: 1; }
.alt-state .screen-id {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  color: var(--text-4);
}

.sb-meta {
  padding: 12px 18px 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-4);
  letter-spacing: 0.04em;
  line-height: 1.7;
}
.sb-meta .key { color: var(--text-3); margin-right: 8px; }

.copy-button {
  position: absolute;
  bottom: 12px;
  left: 12px;
  right: 12px;
  padding: 11px 14px;
  background: var(--accent);
  color: var(--bg);
  border: none;
  border-radius: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.02em;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  box-shadow: var(--shadow-md);
  transition: filter 100ms ease, transform 80ms ease;
}
.copy-button:hover { filter: brightness(1.05); }
.copy-button:active { transform: translateY(1px); }
.copy-button .arrow { font-size: 13px; }
.copy-toast {
  position: absolute;
  bottom: 56px;
  left: 12px;
  right: 12px;
  padding: 9px 12px;
  background: var(--success-soft);
  color: var(--success);
  border: 1px solid var(--success);
  border-radius: 5px;
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  text-align: center;
  animation: toastSlideUp 200ms ease;
}
@keyframes toastSlideUp {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ========== APP CHROME (inside browser-content) ========== */
.app-shell {
  height: 100%;
  min-height: 0;
  display: flex;
  flex-direction: column;
  background: var(--bg);
  position: relative;
}
.app-shell[data-density="compact"] { --density-mult: 0.7; }
.app-shell[data-density="comfortable"] { --density-mult: 1; }
.app-shell[data-density="spacious"] { --density-mult: 1.5; }
.app-shell[data-density="compact"] .dash-toolbar { padding: 10px 20px; }
.app-shell[data-density="spacious"] .dash-toolbar { padding: 18px 20px; }
.app-shell[data-density="compact"] .tag-rail { padding: 0 20px 9px; }
.app-shell[data-density="spacious"] .tag-rail { padding: 0 20px 16px; }
.app-shell[data-palette="off"] .app-cmdk-trigger { display: none; }
.app-shell[data-palette="floating"] .app-cmdk-trigger { display: none; }
.palette-fab {
  position: absolute;
  bottom: 22px;
  right: 22px;
  width: 44px;
  height: 44px;
  border-radius: 22px;
  background: var(--accent);
  color: var(--bg);
  border: none;
  box-shadow: var(--shadow-lg);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2;
}
.palette-fab:hover { filter: brightness(1.07); }
.palette-fab .kbd-mini {
  position: absolute;
  bottom: -22px;
  right: 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-3);
  white-space: nowrap;
}
.app-topbar {
  display: flex;
  align-items: center;
  height: 44px;
  padding: 0 16px;
  background: var(--bg-elevated);
  border-bottom: 1px solid var(--border);
  gap: 16px;
  flex-shrink: 0;
}
.app-brand {
  display: flex; align-items: center; gap: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  font-size: 12.5px;
}
.app-brand .glyph {
  width: 18px; height: 18px;
  border-radius: 4px;
  background: var(--accent);
  color: var(--bg);
  font-size: 10.5px;
  font-weight: 700;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.app-nav {
  display: flex; gap: 2px;
  margin-left: 12px;
}
.app-nav a {
  padding: 5px 10px;
  font-size: 12px;
  color: var(--text-2);
  border-radius: 4px;
  text-decoration: none;
  font-weight: 450;
  cursor: pointer;
}
.app-nav a:hover { color: var(--text); background: var(--surface-2); }
.app-nav a.active { color: var(--text); background: var(--surface-2); }

.app-spacer { flex: 1; }
.kbd {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  padding: 1px 5px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 3px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-3);
}
.app-cmdk-trigger {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 8px 4px 10px;
  background: var(--surface-2);
  border: 1px solid var(--border-subtle);
  border-radius: 5px;
  color: var(--text-3);
  font-size: 11.5px;
  cursor: pointer;
  min-width: 200px;
}
.app-cmdk-trigger:hover { border-color: var(--border); }

.app-actions { display: flex; gap: 6px; align-items: center; }
.btn {
  padding: 5px 11px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11.5px;
  font-weight: 500;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  border-radius: 5px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: background 80ms ease;
}
.btn:hover { background: var(--surface-hover); }
.btn-primary {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--bg);
  font-weight: 600;
}
.btn-primary:hover { filter: brightness(1.07); }
.btn-ghost {
  background: transparent;
  border-color: transparent;
  color: var(--text-2);
}
.btn-ghost:hover { background: var(--surface-2); color: var(--text); }
.btn-danger { border-color: var(--danger); color: var(--danger); }
.btn-danger:hover { background: var(--danger-soft); }
.btn-sm { padding: 3px 8px; font-size: 11px; }

.app-content {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  overflow-x: hidden;
  overscroll-behavior: contain;
}

/* ========== DASHBOARD (S1) ========== */
.dash-toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border-subtle);
}
.search-input {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 7px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12.5px;
  color: var(--text);
  max-width: 580px;
}
.search-input.focused { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.search-input .magnifier { color: var(--text-3); }
.search-input input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: inherit;
  font: inherit;
}
.search-input .typed { color: var(--text); }
.search-input .cursor {
  display: inline-block;
  width: 7px; height: 14px;
  background: var(--accent);
  vertical-align: middle;
  animation: blink 1.05s steps(2) infinite;
}
@keyframes blink { 50% { opacity: 0; } }

.tag-rail {
  display: flex; gap: 6px; align-items: center;
  padding: 0 20px 12px;
  border-bottom: 1px solid var(--border-subtle);
  flex-wrap: wrap;
}
.tag-rail .label {
  font-size: 10.5px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text-3);
  letter-spacing: 0.06em;
  margin-right: 4px;
}
.tag-chip {
  padding: 3px 8px;
  border: 1px solid var(--border);
  border-radius: 11px;
  font-size: 11px;
  color: var(--text-2);
  cursor: pointer;
  font-family: 'JetBrains Mono', monospace;
  background: var(--surface);
  display: inline-flex; align-items: center; gap: 4px;
}
.tag-chip:hover { background: var(--surface-hover); }
.tag-chip.active {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-soft);
}
.tag-chip .x { color: var(--text-4); margin-left: 2px; }

.type-tabs {
  display: flex;
  gap: 0;
  padding: 0 20px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 1;
}
.type-tab {
  padding: 10px 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--text-3);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-bottom: -1px;
}
.type-tab:hover { color: var(--text-2); }
.type-tab.active { color: var(--text); border-bottom-color: var(--accent); }
.type-tab .icon {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--type-icon-color, var(--text-3));
}
.type-tab .count {
  font-size: 10px;
  color: var(--text-4);
  background: var(--surface-2);
  padding: 1px 5px;
  border-radius: 8px;
}

.type-section {
  border-bottom: 1px solid var(--border-subtle);
}
.type-section-header {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 20px;
  background: var(--bg-elevated);
  cursor: pointer;
  position: sticky;
  top: 0;
  z-index: 1;
  border-bottom: 1px solid var(--border-subtle);
}
.type-section-header .chev { color: var(--text-3); font-size: 11px; }
.type-section-header .label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11.5px;
  letter-spacing: 0.04em;
  color: var(--text);
  text-transform: uppercase;
}
.type-section-header .count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-4);
}
.type-section-header .icon {
  width: 8px; height: 8px;
  border-radius: 50%;
}

.entry-row {
  display: grid;
  grid-template-columns: 28px minmax(0, 1fr) 100px auto;
  align-items: center;
  gap: 14px;
  padding: calc(var(--row-pad-y, 10px) * var(--density-mult, 1)) 20px;
  border-bottom: 1px solid var(--border-subtle);
  cursor: pointer;
  transition: background 60ms ease;
  position: relative;
}
.entry-row:hover { background: var(--surface); }
.entry-row.unified { grid-template-columns: 28px 60px minmax(0, 1.4fr) minmax(0, 1.2fr) 100px auto; }
.entry-row .type-icon {
  width: 22px; height: 22px;
  border-radius: 5px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  color: var(--bg);
  letter-spacing: -0.04em;
}
.entry-row .type-label-mono {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  letter-spacing: 0.06em;
  color: var(--text-3);
  text-transform: uppercase;
}
.entry-row .name-block { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.entry-row .name {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12.5px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.entry-row .fingerprint {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  color: var(--text-4);
  letter-spacing: 0.04em;
}
.entry-row .meta-line {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  color: var(--text-3);
  display: flex;
  gap: 10px;
  align-items: center;
  margin-top: 2px;
}
.entry-row .note-preview {
  font-size: 11.5px;
  color: var(--text-3);
  margin-top: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 480px;
  font-style: italic;
  line-height: 1.4;
}
.entry-row .refs-line {
  display: flex; gap: 6px; align-items: center;
  margin-top: 4px;
  flex-wrap: wrap;
}
.entry-row .ref-chip {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  padding: 1px 6px 1px 4px;
  background: var(--surface);
  border: 1px solid var(--border-subtle);
  border-radius: 3px;
  color: var(--text-2);
  display: inline-flex; align-items: center; gap: 4px;
}
.entry-row .ref-chip::before { content: '↗'; color: var(--text-4); font-size: 10px; }
.entry-row .last-access {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  color: var(--text-4);
  text-align: right;
  white-space: nowrap;
}
.entry-row .actions { display: flex; gap: 4px; align-items: center; }
.entry-row { outline: none; }
.entry-row.hover-mode .actions,
.entry-row.focus-mode .actions { opacity: 0; transition: opacity 80ms ease; }
.entry-row.hover-mode:hover .actions,
.entry-row.focus-mode:hover .actions,
.entry-row.focus-mode:focus .actions,
.entry-row.focus-mode:focus-within .actions { opacity: 1; }
.entry-row.focus-mode:focus,
.entry-row.focus-mode:focus-within {
  background: var(--surface);
  box-shadow: inset 2px 0 0 var(--accent);
}
.entry-row .tag-mini {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  padding: 0 5px;
  background: var(--surface-2);
  border-radius: 7px;
  color: var(--text-3);
  height: 16px;
  display: inline-flex;
  align-items: center;
}

.icon-btn {
  width: 26px; height: 26px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: transparent;
  border: 1px solid transparent;
  border-radius: 4px;
  color: var(--text-3);
  cursor: pointer;
  font-size: 13px;
}
.icon-btn:hover { background: var(--surface-2); color: var(--text); border-color: var(--border-subtle); }

/* unified table mode */
.unified-table-head {
  display: grid;
  grid-template-columns: 28px 60px 1.6fr 1fr 100px auto;
  gap: 14px;
  padding: 8px 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--text-4);
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
  background: var(--bg-elevated);
  position: sticky;
  top: 0;
  z-index: 1;
}

/* ========== TYPE COLOURS ========== */
.api_key { background: var(--type-api); }
.ssh_key { background: var(--type-ssh); }
.server { background: var(--type-server); }
.domain { background: var(--type-domain); }
.note { background: var(--type-note); }

/* ========== ENTRY DETAIL (S2) ========== */
.detail-shell {
  display: grid;
  grid-template-columns: 1fr 320px;
  gap: 0;
  height: 100%;
}
.detail-main {
  padding: 20px 28px;
  overflow: auto;
}
.detail-side {
  border-left: 1px solid var(--border-subtle);
  padding: 20px 22px;
  background: var(--bg-elevated);
  overflow: auto;
}
.detail-header {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 4px;
}
.detail-header .type-badge {
  padding: 2px 9px;
  border-radius: 11px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  font-weight: 600;
}
.detail-name {
  font-family: 'JetBrains Mono', monospace;
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--text);
  margin: 6px 0 8px;
}
.detail-tags {
  display: flex; gap: 6px; align-items: center;
  margin-bottom: 18px;
  flex-wrap: wrap;
}
.detail-action-bar {
  display: flex; gap: 8px;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border-subtle);
}
.field-section {
  margin-bottom: 28px;
}
.field-section-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  letter-spacing: 0.1em;
  color: var(--text-4);
  text-transform: uppercase;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.field-row {
  display: grid;
  grid-template-columns: 130px 1fr auto;
  gap: 16px;
  padding: 9px 0;
  border-bottom: 1px solid var(--border-subtle);
  align-items: center;
}
.field-row:last-child { border-bottom: none; }
.field-row .key {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11.5px;
  color: var(--text-3);
}
.field-row .value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12.5px;
  color: var(--text);
  word-break: break-all;
}
.field-row .value.secret {
  color: var(--text-2);
  letter-spacing: 0.15em;
}
.field-row .value-meta {
  font-size: 10.5px;
  color: var(--text-4);
  margin-top: 2px;
  font-family: 'JetBrains Mono', monospace;
}

.refs-list { display: flex; flex-direction: column; gap: 6px; }
.refs-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px;
  background: var(--surface);
  border: 1px solid var(--border-subtle);
  border-radius: 5px;
  cursor: pointer;
}
.refs-item:hover { border-color: var(--border); background: var(--surface-2); }
.refs-item .role {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.07em;
  color: var(--text-4);
  text-transform: uppercase;
  width: 80px;
}
.refs-item .target { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
.refs-item .target .name {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--text);
}
.refs-item .target .type-mono {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  color: var(--text-3);
  background: var(--surface-2);
  padding: 1px 5px;
  border-radius: 2px;
  letter-spacing: 0.05em;
}
.refs-item .arrow { color: var(--text-4); font-size: 12px; }

.mini-audit {
  display: flex; flex-direction: column; gap: 4px;
}
.mini-audit-row {
  display: grid;
  grid-template-columns: 80px 80px 1fr;
  gap: 10px;
  padding: 6px 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  border-bottom: 1px dashed var(--border-subtle);
}
.mini-audit-row .ts { color: var(--text-3); }
.mini-audit-row .op-tag {
  padding: 0 6px;
  background: var(--surface-2);
  border-radius: 3px;
  font-size: 10px;
  letter-spacing: 0.05em;
  color: var(--text-2);
  display: inline-flex;
  align-items: center;
  height: 16px;
  width: fit-content;
}
.mini-audit-row .op-inject { background: rgba(217, 168, 80, 0.15); color: var(--type-api); }
.mini-audit-row .op-copy { background: rgba(102, 149, 217, 0.15); color: var(--info); }
.mini-audit-row .op-resolve { background: rgba(111, 179, 122, 0.15); color: var(--success); }
.mini-audit-row .op-reveal { background: rgba(217, 101, 101, 0.15); color: var(--danger); }
.mini-audit-row .ctx { color: var(--text-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.danger-zone {
  margin-top: 18px;
  padding: 12px 14px;
  border: 1px dashed var(--danger);
  border-radius: 6px;
  background: var(--danger-soft);
}
.danger-zone-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--danger);
  margin-bottom: 6px;
}
.danger-zone-body {
  font-size: 11.5px;
  color: var(--text-2);
  line-height: 1.5;
}

/* delete-with-refs modal */
.modal-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(8, 9, 10, 0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 5;
}
.modal {
  width: 480px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 8px;
  box-shadow: var(--shadow-lg);
  overflow: hidden;
}
.modal-header {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 600;
}
.modal-body {
  padding: 16px 18px;
  font-size: 13px;
  color: var(--text-2);
  line-height: 1.55;
}
.modal-footer {
  padding: 12px 18px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  background: var(--surface);
}

.checkbox-row {
  display: flex; align-items: center; gap: 8px;
  margin-top: 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11.5px;
  color: var(--text);
}
.checkbox-row input { accent-color: var(--accent); }

/* ========== NEW/EDIT MODAL (S3) ========== */
.new-modal {
  width: 720px;
  max-height: 84vh;
  display: flex;
  flex-direction: column;
}
.type-cards {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  padding: 16px 18px;
}
.type-card {
  padding: 12px 8px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--surface);
  cursor: pointer;
  text-align: center;
  transition: all 100ms ease;
}
.type-card:hover { border-color: var(--border-strong); }
.type-card.selected {
  border-color: var(--accent);
  background: var(--accent-soft);
}
.type-card .icon-large {
  width: 26px; height: 26px;
  border-radius: 6px;
  margin: 0 auto 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  color: var(--bg);
}
.type-card .label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text);
}
.type-card.selected .label { color: var(--accent); }
.form-fields {
  flex: 1;
  overflow: auto;
  padding: 8px 18px 18px;
}
.form-row {
  display: grid;
  grid-template-columns: 130px 1fr;
  gap: 14px;
  padding: 10px 0;
  align-items: flex-start;
}
.form-row .label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11.5px;
  color: var(--text-3);
  padding-top: 6px;
}
.form-row .label .req { color: var(--accent); }
.text-input, .textarea-input {
  width: 100%;
  padding: 7px 10px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 5px;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12.5px;
  outline: none;
}
.text-input:focus, .textarea-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.textarea-input {
  font-family: 'JetBrains Mono', monospace;
  resize: vertical;
  min-height: 70px;
}
.tag-input-shell {
  display: flex; gap: 6px; flex-wrap: wrap;
  padding: 5px 10px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 5px;
  min-height: 32px;
  align-items: center;
}
.tag-input-shell .tag-mini { background: var(--surface-2); }
.tag-input-shell input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  min-width: 80px;
}
.refs-picker {
  display: flex; flex-direction: column; gap: 4px;
}
.refs-picker .picked {
  display: flex;
  gap: 6px;
  padding: 4px 6px 4px 10px;
  background: var(--accent-soft);
  border: 1px solid var(--accent);
  border-radius: 5px;
  width: fit-content;
  align-items: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--accent);
}
.refs-picker .picked .x {
  cursor: pointer;
  padding: 0 4px;
}

.help-line {
  font-size: 11px;
  color: var(--text-4);
  margin-top: 4px;
  font-family: 'JetBrains Mono', monospace;
}

/* ========== BULK PASTE (S4) ========== */
.bulk-shell {
  height: 100%;
  display: flex;
  flex-direction: column;
}
.bulk-header {
  padding: 16px 24px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border-subtle);
}
.bulk-header .h1 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px;
  font-weight: 600;
  color: var(--text);
}
.bulk-header .h1 .crumb {
  font-size: 12px;
  color: var(--text-3);
  margin-right: 8px;
}
.format-link {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--accent);
  cursor: pointer;
  text-decoration: none;
  border-bottom: 1px dashed var(--accent-line);
}

.bulk-split { display: grid; flex: 1; min-height: 0; }
.bulk-split.horizontal { grid-template-columns: 1fr 1fr; }
.bulk-split.vertical { grid-template-rows: 1fr 1fr; }
.bulk-pane {
  overflow: hidden;
  display: flex;
  flex-direction: column;
  min-height: 0;
}
.bulk-pane + .bulk-pane { border-left: 1px solid var(--border-subtle); }
.bulk-split.vertical .bulk-pane + .bulk-pane { border-left: none; border-top: 1px solid var(--border-subtle); }
.bulk-pane-header {
  padding: 8px 18px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  letter-spacing: 0.1em;
  color: var(--text-4);
  text-transform: uppercase;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border-subtle);
  background: var(--bg-elevated);
}
.bulk-textarea {
  flex: 1;
  padding: 14px 18px;
  background: var(--bg);
  color: var(--text);
  border: none;
  outline: none;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12.5px;
  line-height: 1.65;
  resize: none;
  white-space: pre;
  overflow: auto;
  tab-size: 2;
}
.bulk-textarea::selection { background: var(--accent-soft); }
.bulk-textarea-display {
  flex: 1;
  padding: 14px 18px;
  background: var(--bg);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12.5px;
  line-height: 1.65;
  white-space: pre;
  overflow: auto;
  color: var(--text);
}
.bulk-textarea-display .keyword { color: var(--type-server); }
.bulk-textarea-display .secret { color: var(--type-api); }
.bulk-textarea-display .comment { color: var(--text-4); font-style: italic; }
.bulk-textarea-display .tag-marker { color: var(--type-domain); }
.bulk-textarea-display .multiline { color: var(--success); }

.bulk-preview-table {
  flex: 1;
  overflow: auto;
}
.bulk-preview-row {
  display: grid;
  grid-template-columns: 28px 22px 1.5fr 90px 1fr 0.8fr 18px;
  gap: 10px;
  align-items: center;
  padding: 7px 14px;
  border-bottom: 1px solid var(--border-subtle);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11.5px;
}
.bulk-preview-row.header {
  position: sticky;
  top: 0;
  background: var(--bg-elevated);
  font-size: 10px;
  letter-spacing: 0.08em;
  color: var(--text-4);
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
}
.bulk-preview-row .row-num { color: var(--text-4); text-align: right; }
.bulk-preview-row .type-dropdown {
  background: var(--surface);
  border: 1px solid var(--border-subtle);
  color: var(--text);
  padding: 2px 4px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  border-radius: 3px;
}
.bulk-preview-row .name { font-weight: 500; }
.bulk-preview-row .summary { color: var(--text-2); font-size: 11px; }
.bulk-preview-row .status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--success);
}
.bulk-preview-row.error { background: rgba(217, 101, 101, 0.05); }
.bulk-preview-row.error .status-dot { background: var(--danger); }
.bulk-preview-row.error .name { color: var(--danger); }
.bulk-preview-row .err-msg {
  font-size: 10.5px;
  color: var(--danger);
  font-style: italic;
}

.bulk-error-detail {
  background: var(--danger-soft);
  padding: 10px 14px;
  margin: 0 14px 8px;
  border-left: 2px solid var(--danger);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text);
  border-radius: 0 4px 4px 0;
}
.bulk-error-detail .line-no { color: var(--danger); margin-right: 8px; }

.bulk-savebar {
  padding: 12px 24px;
  background: var(--bg-elevated);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.bulk-savebar .summary {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--text-2);
}
.bulk-savebar .summary strong { color: var(--text); font-weight: 600; }
.bulk-savebar .summary .err { color: var(--danger); }

/* ========== AUDIT (S5) ========== */
.audit-shell { padding: 18px 24px; }
.charts-row {
  display: grid;
  grid-template-columns: 1.2fr 1.4fr 1fr;
  gap: 14px;
  margin-bottom: 18px;
}
.chart-card {
  background: var(--surface);
  border: 1px solid var(--border-subtle);
  border-radius: 6px;
  padding: 12px 14px;
}
.chart-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-4);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.chart-title .meta {
  color: var(--text-3);
  font-weight: 400;
  letter-spacing: 0.04em;
}
.chart-card svg { width: 100%; height: auto; display: block; }

.bar-row {
  display: grid;
  grid-template-columns: 130px 1fr 50px;
  gap: 10px;
  align-items: center;
  padding: 4px 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
}
.bar-row .name { color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bar-row .bar-track {
  height: 6px;
  background: var(--surface-2);
  border-radius: 1px;
  overflow: hidden;
}
.bar-row .bar-fill { height: 100%; background: var(--accent); }
.bar-row .num { color: var(--text-3); text-align: right; }

.audit-filters {
  display: flex;
  gap: 14px;

function highlightPaste(text) {
  // Very lightweight syntax highlight for the placeholder
  const lines = text.split('\n');
  return lines.map((line, i) => {
    if (line.trim().startsWith('#')) {
      return <span key={i}><span className="comment">{line}</span>{'\n'}</span>;
    }
    if (line.trim().startsWith('-----')) {
      return <span key={i}><span className="multiline">{line}</span>{'\n'}</span>;
    }
    if (line.includes('"""')) {
      return <span key={i}><span className="multiline">{line}</span>{'\n'}</span>;
    }
    const match = line.match(/^([\w-]+)(\s*\([\w]+\))?\s*([=:])\s*(.+?)(\s*\[[\w,]+\])?$/);
    if (match) {
      return <span key={i}>
        <span className="keyword">{match[1]}</span>
        {match[2] && <span className="comment">{match[2]}</span>}
        <span style={{color: 'var(--text-3)'}}> {match[3]} </span>
        <span className="secret">{match[4]}</span>
        {match[5] && <span className="tag-marker">{match[5]}</span>}
        {'\n'}
      </span>;
    }
    return <span key={i}>{line}{'\n'}</span>;
  });
}

function linePath(data, w, h) {
  const max = Math.max(...data);
  const step = w / (data.length - 1);
  return data.map((v, i) => `${i === 0 ? 'M' : 'L'} ${i * step} ${h - (v / max) * (h - 4) - 2}`).join(' ');
}
function areaPath(data, w, h) {
  return linePath(data, w, h) + ` L ${w} ${h} L 0 ${h} Z`;
}

function App() {
  const [activeScreen, setActiveScreen] = useState('S1');

  const [activeStep, setActiveStep] = useState(0);
  const [activeAltState, setActiveAltState] = useState(null);
  const [tweaks, setTweaks] = useState(DEFAULT_TWEAKS);
  const [tokenExpired, setTokenExpired] = useState(false);

  // sync theme + accent to <html>
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', tweaks.theme === 'system' ? 'dark' : tweaks.theme);
    document.documentElement.setAttribute('data-accent', tweaks.accent);
  }, [tweaks.theme, tweaks.accent]);

  // sync activeScreen with current flow step
  useEffect(() => {
    const flow = FLOWS.find(f => f.id === activeFlow);
    if (flow && flow.steps[activeStep]) {
      const step = flow.steps[activeStep];
      setActiveScreen(step.screen);
      if (step.state !== 'default') setActiveAltState(step.state);
      else setActiveAltState(null);
    }
  }, [activeFlow, activeStep]);

  // alt-state global token-expired override
  useEffect(() => {
    setTokenExpired(activeAltState === 'token-expired');
  }, [activeAltState]);

  const handleCopyLockIn = () => {
    const flow = FLOWS.find(f => f.id === activeFlow);
    const step = flow.steps[activeStep];
    const screenName = SCREEN_MAP[activeScreen].name;
    const lines = [];
    lines.push(`Lock these design choices into the UX spec at ${SPEC_PATH}:`);
    lines.push('');
    lines.push(`Screen ${activeScreen} · ${screenName}:`);
    TWEAK_DEFINITIONS.filter(t => (t.scope === 'global' || t.scope === activeScreen) && t.dim).forEach(t => {
      lines.push(`- §8.4 DIM ${t.dim.n} ${t.dim.name}: ${tweaks[t.key]}`);
    });
    TWEAK_DEFINITIONS.filter(t => (t.scope === 'global' || t.scope === activeScreen) && !t.dim).forEach(t => {
      lines.push(`- ${t.label}: ${tweaks[t.key]}`);
    });
    lines.push('');
    lines.push('Action: update §8.4 — mark these variants as "locked" for this screen and move non-chosen variants to §9.5 Considered Alternatives. Re-run §6 self-review and regenerate the §8 hand-off phrase.');
    const txt = lines.join('\n');
    if (navigator.clipboard) {
      navigator.clipboard.writeText(txt);
    }
  };

  const Screen = SCREEN_MAP[activeScreen].component;
  const stateForScreen = activeAltState && (activeAltState !== 'token-expired') ? activeAltState : 'default';

  return (

              <span className="lock">●</span>

            </div>
          </div>
          <div className="browser-content">
            {tokenExpired ? (
              <div className="curtain">
                <div className="glyph">K</div>
                <div className="title">Token expired</div>
                <div className="sub">This admin session has been invalidated. Re-run the CLI for a fresh token.</div>
                <div className="cmd mono">$ keys serve</div>
              </div>
            ) : (
              <Screen tweaks={tweaks} state={stateForScreen} onOpenEntry={() => setActiveScreen('S2')} />

      <Sidebar
        activeScreen={activeScreen}
        setActiveScreen={setActiveScreen}
        activeFlow={activeFlow}
        setActiveFlow={setActiveFlow}
        activeStep={activeStep}
        setActiveStep={setActiveStep}
        activeAltState={activeAltState}
        setActiveAltState={setActiveAltState}
        tweaks={tweaks}
        setTweaks={setTweaks}
        onCopy={handleCopyLockIn}
      />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
